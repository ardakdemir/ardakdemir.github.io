<article>
  <div class="section-header">
    <i class="fa-solid fa-pen-nib"></i>
    <h2>{{ page.title }}</h2>
  </div>

  <p style="font-size: 0.88rem; color: #999; margin-bottom: 24px;">
    <i class="fa-regular fa-calendar"></i> {{ page.date | date_to_long_string }}
  </p>

  <div class="content" style="font-size: 0.95rem; line-height: 1.8; color: #444;">
    {{ content }}
  </div>

  <hr style="margin: 40px 0 20px; border: none; border-top: 1px solid #eee;">

  <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
    {% if page.previous %}
      <a href="{{ BASE_PATH }}{{ page.previous.url }}" style="color: #4361ee; text-decoration: none;">&larr; {{ page.previous.title }}</a>
    {% else %}
      <span></span>
    {% endif %}
    <a href="{{ BASE_PATH }}/blog/" style="color: #4361ee; text-decoration: none;">All Posts</a>
    {% if page.next %}
      <a href="{{ BASE_PATH }}{{ page.next.url }}" style="color: #4361ee; text-decoration: none;">{{ page.next.title }} &rarr;</a>
    {% else %}
      <span></span>
    {% endif %}
  </div>
</article>
